<!DOCTYPE html>
<html>
<head>
    <title>YUKI - 3D Creations</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
        }

        header {
            background: black;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #ff4da6;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            padding: 20px;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            background: black;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #ff4da6;
        }
    </style>
</head>

<body>

<header>
    <h1>YUKI - 3D Creations</h1>
    <p>Unique 3D Printed Designs</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Gaming</a>
    <a href="#">Decor</a>
    <a href="#">Custom</a>
</nav>

<section class="products">

    <div class="card">
        <h3>3D Phone Stand</h3>
        <p>Price: 1200 DA</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h3>Gaming Controller Holder</h3>
        <p>Price: 2500 DA</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h3>Mini Dragon Figure</h3>
        <p>Price: 1800 DA</p>
        <button>Buy Now</button>
    </div>

</section>

</body>
</html>
